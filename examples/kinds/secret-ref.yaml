apiVersion: infra.luminous3d.example/v1alpha1
kind: SecretRef
metadata:
  name: secret-pve-token
spec:
  provider: openbao
  path: kv/data/infra/proxmox/home
  keys:
    - api_token_id
    - api_token_secret
  rotation:
    enabled: true
    intervalDays: 90
  description: Proxmox API token for the home cluster. Value lives in OpenBao only.
